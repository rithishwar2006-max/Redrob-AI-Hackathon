ai_usage_summary: |
  Used Gemini and Claude as expert pair programmers for architectural brainstorming, implementing strict regex word-boundary safety, designing extraction primitives, and debugging. No LLM APIs are called during execution and no candidate data was fed into an LLM during runtime.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Our system implements a deterministic heuristic ranking engine. To respect the strict 5-minute CPU constraint without sacrificing semantic quality, we avoided slow LLM API calls and instead built dense, word-boundary-safe taxonomies. 
  The pipeline flows through explicit stages: Hard Gates → CRI → Raw Fit Score → Calibration → Confidence Multiplier → Final Ranking. We prioritized substance over keyword density by restricting evidence extraction strictly to title-consistent career history, effectively penalizing "title-chasers" and GenAI-wrapper profiles. 
  During calibration, the system dynamically weights experience by recency and rigorously checks for disclaimed ownership (e.g., "deployment was handled by the platform team") to eliminate false positives. Finally, we smooth scores using a multi-factor confidence interval. The system naturally avoids honeypot profiles through title-consistency checks and substance requirements. We iterated extensively using real diagnostic data, resulting in a robust, product-engineering-focused ranker.

